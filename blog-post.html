<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Field Note - Classified Archives</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            "surface": "#131313",
            "surface-dim": "#131313",
            "surface-bright": "#3a3939",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-low": "#1c1b1b",
            "surface-container": "#201f1f",
            "surface-container-high": "#2a2a2a",
            "surface-container-highest": "#353534",
            "primary": "#ff4500",
            "on-primary": "#000000",
            "outline-variant": "#5d4038",
            "on-surface": "#e5e2e1",
            "on-surface-variant": "#a3a3a3"
          },
          fontFamily: {
            "headline": ["Space Grotesk", "sans-serif"],
            "label": ["JetBrains Mono", "monospace"],
            "body": ["Geist", "sans-serif"]
          }
        }
      }
    }
  </script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500&display=swap" rel="stylesheet"/>
<style>
    body {
      background-color: #131313;
      color: #e5e2e1;
      background-image: linear-gradient(rgba(255, 69, 0, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 69, 0, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 50;
      opacity: 0.3;
    }
    .dossier-tabs {
      clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%);
    }
    .tactical-card {
      background: linear-gradient(145deg, #1c1c1c, #131313);
      border: 1px solid #333333;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.8);
    }
    .like-btn {
      transition: all 0.3s ease;
    }
    .like-btn.liked {
      color: #ff4500;
    }
    .comment-input {
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      color: #e5e2e1;
      outline: none;
    }
    .comment-input:focus {
      border-color: #ff4500;
    }
  </style>
</head>
<body class="font-body antialiased relative min-h-screen">
<div class="scanlines"></div>
<div class="fixed inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.8)_100%)] pointer-events-none z-10"></div>
<header class="fixed top-0 left-0 w-full z-40 flex justify-center pt-4">
<nav class="flex gap-2">
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-8 py-2 text-sm hover:text-primary transition-colors" href="index.html">CRIME SCENE</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-8 py-2 text-sm hover:text-primary transition-colors" href="profile.html">SUSPECT</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-8 py-2 text-sm hover:text-primary transition-colors" href="evidence.html">EVIDENCE</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-8 py-2 text-sm hover:text-primary transition-colors" href="field-notes.html">FIELD NOTES</a>
</nav>
</header>

<main class="max-w-3xl mx-auto px-4 pt-28 pb-16 relative z-20" id="post-content">
  <div id="loading" class="text-center py-32">
    <p class="font-label text-on-surface-variant animate-pulse">DECRYPTING FIELD NOTE...</p>
  </div>
</main>

<script>
  const posts = {
    0: {
      title: "Why localization is not always the answer",
      date: "4/21/2026",
      content: `
        <p class="mb-6 leading-relaxed">In the world of software development, localization is often presented as the gold standard for reaching global audiences. Translate the UI, adapt the formats, and you're done. But in practice, localization introduces a host of complexities that can outweigh its benefits.</p>
        <p class="mb-6 leading-relaxed">Every language has its own idiosyncrasies. Text expansion in German can break layouts. Right-to-left languages require complete UI mirroring. Date formats, currency symbols, and measurement units vary wildly — and each one is a potential bug.</p>
        <p class="mb-6 leading-relaxed">The cost of maintaining localized content at scale grows linearly with every language you add. Translation management, cultural adaptation, and region-specific compliance create an operational burden that many teams underestimate.</p>
        <p class="mb-6 leading-relaxed">Sometimes, the smarter play is to focus on English-first with a clean, minimal interface that's easy to understand globally. Not every product needs to speak every language. Know when localization adds value — and when it just adds complexity.</p>
        <p class="text-on-surface-variant italic">— Field Operative, Fullstack Division</p>
      `
    },
    1: {
      title: "Why developers make a sh*t ton of money",
      date: "4/10/2026",
      content: `
        <p class="mb-6 leading-relaxed">Let's cut through the noise. Developers are paid well because the gap between demand and supply is massive — and the leverage a single developer has over a business is enormous.</p>
        <p class="mb-6 leading-relaxed">A single line of code can automate thousands of hours of manual labor. A well-architected system can scale to millions of users. One developer's decision can save — or cost — a company millions. That level of leverage commands high compensation.</p>
        <p class="mb-6 leading-relaxed">Beyond leverage, the barrier to entry is real. Not everyone can think in abstractions, debug distributed systems at 2 AM, or keep up with a landscape that changes every six months. The ones who can are rare.</p>
        <p class="mb-6 leading-relaxed">So yes, developers make a lot of money. But it's not because of entitlement. It's because the value they create — and the scarcity of that skillset — earns it. If you can build things that work at scale, you set your own price.</p>
        <p class="text-on-surface-variant italic">— Field Operative, Fullstack Division</p>
      `
    }
  };

  function getPostId() {
    return new URLSearchParams(window.location.search).get('id') || '0';
  }

  function renderPost(id) {
    const post = posts[id];
    if (!post) {
      document.getElementById('post-content').innerHTML = '<p class="text-center py-32 font-label text-on-surface-variant">FIELD NOTE NOT FOUND</p>';
      return;
    }

    document.title = `${post.title} - Field Note`;

    const storageKey = `blog_${id}`;
    const data = JSON.parse(localStorage.getItem(storageKey) || '{"liked": false, "likes": 0, "comments": []}');

    function render() {
      const likeIcon = data.liked ? 'favorite' : 'favorite_border';
      const likeClass = data.liked ? 'liked' : '';

      const commentsHtml = data.comments.length === 0
        ? '<p class="text-on-surface-variant text-sm font-label">No intel reports yet. Be the first.</p>'
        : data.comments.map(c =>
            `<div class="border-b border-surface-container-highest pb-4">
              <div class="flex items-center gap-2 mb-1">
                <span class="w-2 h-2 rounded-full bg-primary"></span>
                <span class="font-label text-xs text-primary">ANON_AGENT</span>
                <span class="font-label text-[10px] text-on-surface-variant">${c.time}</span>
              </div>
              <p class="font-body text-sm text-on-surface ml-4">${c.text}</p>
            </div>`
          ).join('');

      document.getElementById('post-content').innerHTML = `
        <a href="field-notes.html" class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors">&larr; BACK TO FIELD NOTES</a>
        <article class="tactical-card rounded-xl p-8 mt-4">
          <div class="flex items-center gap-4 mb-6">
            <span class="border border-primary/50 text-primary text-xs font-bold px-3 py-1 rounded-full bg-orange-950/20 tracking-wider font-label">CLASSIFIED</span>
            <span class="bg-surface-container-high text-on-surface-variant text-xs font-label px-3 py-1 rounded-full">${post.date}</span>
          </div>
          <h1 class="text-3xl md:text-4xl font-headline font-bold text-white mb-8">${post.title}</h1>
          <div class="font-body text-base text-on-surface leading-relaxed">${post.content}</div>
        </article>

        <div class="tactical-card rounded-xl p-6 mt-6">
          <div class="flex items-center gap-3 mb-4">
            <button class="like-btn flex items-center gap-2 ${likeClass}" onclick="toggleLike()">
              <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' ${data.liked ? 1 : 0}">${likeIcon}</span>
              <span class="font-label text-sm" id="like-count">${data.likes}</span>
            </button>
            <span class="text-on-surface-variant font-label text-xs">INTEL RATING</span>
          </div>
        </div>

        <div class="tactical-card rounded-xl p-6 mt-6">
          <h2 class="font-label text-sm text-primary uppercase tracking-wider mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">forum</span>
            INTEL REPORTS (${data.comments.length})
          </h2>
          <div class="space-y-4 mb-6" id="comments-section">
            ${commentsHtml}
          </div>
          <div class="flex gap-2">
            <input type="text" id="comment-input" class="comment-input flex-grow px-4 py-2 font-label text-sm rounded" placeholder="Submit intel report..." maxlength="500"/>
            <button class="bg-primary text-on-primary font-label text-sm px-4 py-2 hover:opacity-80 transition-opacity" onclick="addComment()">SEND</button>
          </div>
        </div>
      `;
    }

    window.toggleLike = function() {
      data.liked = !data.liked;
      data.likes += data.liked ? 1 : -1;
      localStorage.setItem(storageKey, JSON.stringify(data));
      render();
    };

    window.addComment = function() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (!text) return;
      const now = new Date();
      const time = now.toLocaleString();
      data.comments.push({ text, time });
      localStorage.setItem(storageKey, JSON.stringify(data));
      input.value = '';
      render();
    };

    render();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const id = getPostId();
    renderPost(id);
  });
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</body></html>
