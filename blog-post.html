<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Field Note - Classified Archives</title>
<link rel="icon" type="image/png" href="fav.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  const SUPABASE_URL = 'https://njaabydjhwxpgscytxso.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qYWFieWRqaHd4cGdzY3l0eHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDI1NzQsImV4cCI6MjA5OTAxODU3NH0.Ak5tTtJ1v3iVGCgbphAoW2HzZkjUoEmFg_iJZJsgn-A';
  const sbHeaders = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Accept': 'application/json', 'Content-Type': 'application/json' };
  async function sbGet(table, query) { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + (query ? '?' + query : ''), { headers: sbHeaders }); return r.json(); }
  async function sbGetSingle(table, query) { const h = { ...sbHeaders, 'Accept': 'application/vnd.pgrst.object+json' }; const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + (query ? '?' + query : ''), { headers: h }); if (!r.ok) return null; return r.json(); }
  async function sbPost(table, body) { await fetch(SUPABASE_URL + '/rest/v1/' + table, { method: 'POST', headers: { ...sbHeaders, 'Prefer': 'return=representation' }, body: JSON.stringify(body) }); }
  async function sbPatch(table, query, body) { await fetch(SUPABASE_URL + '/rest/v1/' + table + (query ? '?' + query : ''), { method: 'PATCH', headers: { ...sbHeaders, 'Prefer': 'return=representation' }, body: JSON.stringify(body) }); }

  tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            "surface": "#131313",
            "surface-dim": "#131313",
            "surface-bright": "#3a3939",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-low": "#1c1b1b",
            "surface-container": "#201f1f",
            "surface-container-high": "#2a2a2a",
            "surface-container-highest": "#353534",
            "primary": "#ff4500",
            "on-primary": "#000000",
            "outline-variant": "#5d4038",
            "on-surface": "#e5e2e1",
            "on-surface-variant": "#a3a3a3"
          },
          fontFamily: {
            "headline": ["Space Grotesk", "sans-serif"],
            "label": ["JetBrains Mono", "monospace"],
            "body": ["Geist", "sans-serif"]
          }
        }
      }
    }
  </script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500&display=swap" rel="stylesheet"/>
<style>
    body {
      background-color: #131313;
      color: #e5e2e1;
      background-image: linear-gradient(rgba(255, 69, 0, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 69, 0, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 50;
      opacity: 0.3;
    }
    .dossier-tabs {
      clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%);
    }
    .tactical-card {
      background: linear-gradient(145deg, #1c1c1c, #131313);
      border: 1px solid #333333;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.8);
    }
    .like-btn {
      transition: all 0.3s ease;
    }
    .like-btn.liked {
      color: #ff4500;
    }
    .comment-input {
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      color: #e5e2e1;
      outline: none;
    }
    .comment-input:focus {
      border-color: #ff4500;
    }
  </style>
</head>
<body class="font-body antialiased relative min-h-screen">
<div class="scanlines"></div>
<div class="fixed inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.8)_100%)] pointer-events-none z-10"></div>
<header class="fixed top-0 left-0 w-full z-40 flex justify-center pt-4">
<nav class="flex gap-1 md:gap-2 overflow-x-auto flex-nowrap">
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="index.html">CRIME SCENE</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="profile.html">SUSPECT</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="evidence.html">EVIDENCE</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="field-notes.html">FIELD NOTES</a>
</nav>
</header>

<main class="max-w-3xl mx-auto px-4 pt-28 pb-16 relative z-20" id="post-content">
  <div id="loading" class="text-center py-32">
    <p class="font-label text-on-surface-variant animate-pulse">DECRYPTING FIELD NOTE...</p>
  </div>
</main>

<script>
  let currentPostId = null;

  function getPostId() {
    return parseInt(new URLSearchParams(window.location.search).get('id'));
  }

  async function loadPost() {
    const id = getPostId();
    if (!id) {
      document.getElementById('post-content').innerHTML = '<p class="text-center py-32 font-label text-on-surface-variant">FIELD NOTE NOT FOUND</p>';
      return;
    }
    currentPostId = id;

    const post = await sbGetSingle('blog_posts', 'id=eq.' + id + '&select=*');
    if (!post) {
      document.getElementById('post-content').innerHTML = '<p class="text-center py-32 font-label text-on-surface-variant">FIELD NOTE NOT FOUND</p>';
      return;
    }

    document.title = post.title + ' - Field Note';

    await sbPatch('blog_posts', 'id=eq.' + id, { views: (post.views || 0) + 1 });

    const comments = await sbGet('comments', 'select=*&post_id=eq.' + id + '&order=created_at');
    const likesData = await sbGetSingle('likes', 'post_id=eq.' + id + '&select=count');
    const likeCount = likesData?.count || 0;

    const commentsHtml = !comments || comments.length === 0
      ? '<p class="text-on-surface-variant text-sm font-label">No intel reports yet. Be the first.</p>'
      : comments.map(c =>
          `<div class="border-b border-surface-container-highest pb-4">
            <div class="flex items-center gap-2 mb-1">
              <span class="w-2 h-2 rounded-full bg-primary"></span>
              <span class="font-label text-xs text-primary">${c.author || 'ANON_AGENT'}</span>
              <span class="font-label text-[10px] text-on-surface-variant">${new Date(c.created_at).toLocaleString()}</span>
            </div>
            <p class="font-body text-sm text-on-surface ml-4">${c.text}</p>
          </div>`
        ).join('');

    document.getElementById('post-content').innerHTML = `
      <a href="field-notes.html" class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors">&larr; BACK TO FIELD NOTES</a>
      <article class="tactical-card rounded-xl p-6 md:p-8 mt-4">
        <div class="flex items-center gap-4 mb-6">
          <span class="border border-primary/50 text-primary text-xs font-bold px-3 py-1 rounded-full bg-orange-950/20 tracking-wider font-label">CLASSIFIED</span>
          <span class="bg-surface-container-high text-on-surface-variant text-xs font-label px-3 py-1 rounded-full">${post.date}</span>
        </div>
        <h1 class="text-3xl md:text-4xl font-headline font-bold text-white mb-8">${post.title}</h1>
        <div class="font-body text-base text-on-surface leading-relaxed break-words overflow-x-auto">${post.content}</div>
      </article>

      <div class="tactical-card rounded-xl p-6 mt-6">
        <div class="flex items-center gap-3 mb-4">
          <button class="like-btn flex items-center gap-2" onclick="toggleLike(${id})">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 0">favorite_border</span>
            <span class="font-label text-sm" id="like-count">${likeCount}</span>
          </button>
          <span class="text-on-surface-variant font-label text-xs">INTEL RATING</span>
        </div>
      </div>

      <div class="tactical-card rounded-xl p-6 mt-6">
        <h2 class="font-label text-sm text-primary uppercase tracking-wider mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">forum</span>
          INTEL REPORTS (${(comments||[]).length})
        </h2>
        <div class="space-y-4 mb-6" id="comments-section">
          ${commentsHtml}
        </div>
        <div class="flex flex-col sm:flex-row gap-2">
          <input type="text" id="comment-author" class="comment-input w-full sm:w-1/3 px-4 py-2 font-label text-sm rounded" placeholder="Your callsign..." maxlength="50"/>
          <input type="text" id="comment-input" class="comment-input flex-grow px-4 py-2 font-label text-sm rounded" placeholder="Submit intel report..." maxlength="500"/>
          <button class="bg-primary text-on-primary font-label text-sm px-4 py-2 hover:opacity-80 transition-opacity whitespace-nowrap" onclick="addComment(${id})">SEND</button>
        </div>
      </div>
    `;
  }

  window.toggleLike = async function(postId) {
    const existing = await sbGetSingle('likes', 'post_id=eq.' + postId + '&select=*');
    if (existing) {
      await sbPatch('likes', 'post_id=eq.' + postId, { count: existing.count + 1 });
    } else {
      await sbPost('likes', { post_id: postId, count: 1 });
    }
    const updated = await sbGetSingle('likes', 'post_id=eq.' + postId + '&select=count');
    document.getElementById('like-count').textContent = updated?.count || 0;
  };

  window.addComment = async function(postId) {
    const input = document.getElementById('comment-input');
    const authorInput = document.getElementById('comment-author');
    const text = input.value.trim();
    const author = authorInput.value.trim() || 'ANON_AGENT';
    if (!text) return;
    await sbPost('comments', { post_id: postId, text, author });
    input.value = '';
    authorInput.value = '';
    loadPost();
  };

  document.addEventListener('DOMContentLoaded', loadPost);
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</body></html>
