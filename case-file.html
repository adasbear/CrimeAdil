<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Case File - ADIL_ARARSA_INVESTIGATIONS</title>
<link rel="icon" type="image/png" href="fav.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const SUPABASE_URL = 'https://njaabydjhwxpgscytxso.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qYWFieWRqaHd4cGdzY3l0eHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDI1NzQsImV4cCI6MjA5OTAxODU3NH0.Ak5tTtJ1v3iVGCgbphAoW2HzZkjUoEmFg_iJZJsgn-A';
  const sbHeaders = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Accept': 'application/json', 'Content-Type': 'application/json' };
  async function sbGet(table, query) { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + (query ? '?' + query : ''), { headers: sbHeaders }); return r.json(); }
  async function sbGetSingle(table, query) { const h = { ...sbHeaders, 'Accept': 'application/vnd.pgrst.object+json' }; const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + (query ? '?' + query : ''), { headers: h }); if (!r.ok) return null; return r.json(); }

  tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-variant": "#353534",
            "on-secondary": "#4d2600",
            "secondary": "#ffb77d",
            "outline": "#ad887e",
            "primary": "#ffb5a0",
            "surface-container": "#201f1f",
            "surface-dim": "#131313",
            "on-surface": "#e5e2e1",
            "background": "#131313",
            "on-background": "#e5e2e1",
            "outline-variant": "#5d4038",
            "surface-container-high": "#2a2a2a",
            "surface-container-low": "#1c1b1b",
            "on-surface-variant": "#e7bdb2",
            "surface": "#131313",
            "surface-container-lowest": "#0e0e0e"
          },
          fontFamily: {
            "headline-md": ["Space Grotesk"],
            "body-md": ["Geist"],
            "label-mono": ["JetBrains Mono"],
            "display-lg": ["Space Grotesk"]
          }
        }
      }
    }
  </script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Geist:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.15;
    }
    .case-paper {
      background-color: #1a1a1a;
      border: 1px solid #333;
      position: relative;
    }
    .case-paper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(255, 69, 0, 0.03) 27px, rgba(255, 69, 0, 0.03) 28px);
      pointer-events: none;
    }
    .stamp {
      transform: rotate(-12deg);
      opacity: 0.7;
      border: 3px solid #ff4500;
      color: #ff4500;
      padding: 4px 12px;
      font-weight: 700;
      text-transform: uppercase;
      display: inline-block;
    }
    .dossier-tabs {
      clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%);
    }
    .ev-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(60%) contrast(1.1);
      transition: filter 0.4s ease;
    }
    .ev-img:hover {
      filter: grayscale(0%) contrast(1);
    }
    .md-content h1, .md-content h2, .md-content h3 {
      color: #e5e2e1;
      font-family: 'Space Grotesk', sans-serif;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    .md-content h1 { font-size: 1.5rem; }
    .md-content h2 { font-size: 1.25rem; }
    .md-content h3 { font-size: 1.125rem; }
    .md-content p { margin-bottom: 1rem; }
    .md-content ul, .md-content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    .md-content li { margin-bottom: 0.25rem; }
    .md-content code {
      background: #2a2a2a;
      padding: 0.125rem 0.375rem;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
    }
    .md-content pre {
      background: #0e0e0e;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1rem;
      border: 1px solid #2a2a2a;
    }
    .md-content pre code {
      background: none;
      padding: 0;
    }
    .md-content a { color: #ffb77d; text-decoration: underline; }
    .md-content a:hover { color: #ff4500; }
    .md-content blockquote {
      border-left: 3px solid #ff4500;
      padding-left: 1rem;
      margin-left: 0;
      margin-bottom: 1rem;
      color: #a3a3a3;
    }
    .md-content img { max-width: 100%; border-radius: 4px; margin: 1rem 0; }
    .md-content strong { color: #ffb77d; }
  </style>
</head>
<body class="bg-background text-on-surface font-body-md antialiased overflow-x-hidden min-h-screen">
<div class="scanlines"></div>
<header class="fixed top-0 left-0 w-full z-50 flex justify-center pt-4">
<nav class="flex gap-1 md:gap-2 overflow-x-auto flex-nowrap">
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="index.html">CRIME SCENE</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="profile.html">SUSPECT</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="evidence.html">EVIDENCE</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="field-notes.html">FIELD NOTES</a>
<a class="dossier-tabs bg-surface-container-high text-on-surface-variant font-label px-3 md:px-5 py-2 text-sm whitespace-nowrap hover:text-primary transition-colors" href="contact.html">CONTACT</a>
</nav>
</header>

<main class="w-full max-w-5xl mx-auto px-4 md:px-8 pt-28 pb-16" id="case-content">
  <div id="loading" class="text-center py-32">
    <p class="font-label-mono text-on-surface-variant animate-pulse">LOADING CASE FILE...</p>
  </div>
</main>

<script>
  async function loadCase() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    if (!id) {
      document.getElementById('case-content').innerHTML = '<p class="text-center py-32 font-label-mono text-on-surface-variant">CASE FILE NOT FOUND</p>';
      return;
    }

    const project = await sbGetSingle('projects', 'id=eq.' + id + '&select=*');
    if (!project) {
      document.getElementById('case-content').innerHTML = '<p class="text-center py-32 font-label-mono text-on-surface-variant">CASE FILE NOT FOUND</p>';
      return;
    }

    document.title = `${project.name} - Case File`;

    const statusColor = project.status === 'ACTIVE' ? 'text-green-400' : project.status === 'PENDING' ? 'text-yellow-400' : 'text-gray-400';
    const severityColor = project.severity === 'CRITICAL' ? 'text-red-400' : project.severity === 'HIGH' ? 'text-orange-400' : 'text-yellow-400';
    const tech = (project.tech_stack || []).map((t, i) => {
      const opacity = ['', '/80', '/60'][i] || '/60';
      return `<span class="bg-secondary${opacity} text-background font-label-mono text-xs uppercase py-1 px-2 font-bold">${t}</span>`;
    }).join('');
    const caseId = `${project.codename || id}-${Math.floor(Math.random() * 9000) + 1000}`;

    document.getElementById('case-content').innerHTML = `
      <div class="relative">
        <div class="flex justify-between items-start mb-6">
          <div>
            <a href="evidence.html" class="font-label-mono text-xs text-on-surface-variant hover:text-secondary transition-colors">&larr; BACK TO EVIDENCE</a>
            <h1 class="font-display-lg text-4xl md:text-5xl text-on-surface font-bold uppercase tracking-tighter mt-2">${project.name}</h1>
            <p class="font-label-mono text-sm text-secondary mt-1">${project.tagline || ''}</p>
          </div>
          <div class="stamp font-label-mono text-sm">CLASSIFIED</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
          <div class="case-paper p-2 h-48 md:h-72 overflow-hidden">
            <img class="ev-img" src="${project.image_url || ''}" alt="${project.name} evidence photo 1" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-on-surface-variant font-label-mono text-xs\\'>EVIDENCE_IMG_A_MISSING</div>'"/>
          </div>
          <div class="case-paper p-2 h-48 md:h-72 overflow-hidden">
            <img class="ev-img" src="${project.image_url_2 || ''}" alt="${project.name} evidence photo 2" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-on-surface-variant font-label-mono text-xs\\'>EVIDENCE_IMG_B_MISSING</div>'"/>
          </div>
        </div>

        <div class="case-paper p-4 md:p-8 mb-8">
          <div class="flex items-center gap-2 mb-4 border-b border-outline-variant pb-2">
            <span class="material-symbols-outlined text-secondary text-sm">description</span>
            <h2 class="font-label-mono text-sm text-secondary uppercase tracking-wider">Case Details</h2>
          </div>
          <div class="font-body-md text-on-surface-variant leading-relaxed break-words md-content">${marked.parse(project.description || '')}</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-8">
          <div class="case-paper p-6">
            <div class="flex items-center gap-2 mb-4 border-b border-outline-variant pb-2">
              <span class="material-symbols-outlined text-secondary text-sm">build</span>
              <h2 class="font-label-mono text-sm text-secondary uppercase tracking-wider">Tech Stack</h2>
            </div>
            <div class="flex flex-wrap gap-2">${tech || '<span class="font-label-mono text-xs text-on-surface-variant">NONE LISTED</span>'}</div>
          </div>
          <div class="case-paper p-6">
            <div class="flex items-center gap-2 mb-4 border-b border-outline-variant pb-2">
              <span class="material-symbols-outlined text-secondary text-sm">info</span>
              <h2 class="font-label-mono text-sm text-secondary uppercase tracking-wider">Case Status</h2>
            </div>
            <div class="space-y-3">
              <div class="flex justify-between items-center">
                <span class="font-label-mono text-xs text-on-surface-variant uppercase">Status</span>
                <span class="font-label-mono text-sm font-bold ${statusColor}">${project.status || 'UNKNOWN'}</span>
              </div>
              <div class="flex justify-between items-center">
                <span class="font-label-mono text-xs text-on-surface-variant uppercase">Severity</span>
                <span class="font-label-mono text-sm font-bold ${severityColor}">${project.severity || 'UNKNOWN'}</span>
              </div>
              <div class="flex justify-between items-center">
                <span class="font-label-mono text-xs text-on-surface-variant uppercase">Case ID</span>
                <span class="font-label-mono text-sm text-on-surface">${caseId}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          ${project.github_url ? `<a href="${project.github_url}" target="_blank" class="flex items-center justify-center gap-2 bg-surface-container-high border border-outline-variant text-on-surface hover:bg-secondary hover:text-background hover:border-secondary font-label-mono text-sm uppercase tracking-wider px-8 py-3 transition-all duration-300">
            <span class="material-symbols-outlined text-sm">code</span>
            Source Code
          </a>` : ''}
          ${project.live_url ? `<a href="${project.live_url}" target="_blank" class="flex items-center justify-center gap-2 bg-secondary text-background border border-secondary hover:bg-transparent hover:text-secondary font-label-mono text-sm uppercase tracking-wider px-8 py-3 transition-all duration-300">
            <span class="material-symbols-outlined text-sm">open_in_new</span>
            Live Site
          </a>` : ''}
        </div>
      </div>
    `;
  }

  document.addEventListener('DOMContentLoaded', loadCase);
</script>
</body></html>
