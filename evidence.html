<script>
  async function loadProjects() {
    const data = await sbGet('projects', 'select=*&order=display_order');
    const grid = document.getElementById('projects-grid');
    if (!grid) return;
    if (!data || data.length === 0) {
      grid.innerHTML = '<p class="col-span-full text-center text-on-surface-variant font-label-mono">No case files found.</p>';
      return;
    }
    grid.innerHTML = data.map(p => {
      const tech = (p.tech_stack || []).map(t => `<span class="bg-secondary text-background font-label-mono text-xs uppercase py-1 px-2 font-bold">${t}</span>`).join('');
      return `
        <article class="bg-[#0A0A0A] border border-outline-variant p-4 flex flex-col relative group cursor-pointer hover:border-secondary transition-colors duration-300 reveal" onclick="window.location.href='case-file.html?id=${p.id}'">
          <div class="flex justify-center mb-4">
            <div class="w-3 h-3 rounded-full bg-[#ff4500] shadow-[0_0_8px_rgba(255,69,0,0.8)]"></div>
          </div>
          <div class="border border-outline-variant p-1 mb-4 bg-background h-64 relative overflow-hidden">
            <img class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" alt="${p.name}" src="${p.image_url || 'https://lh3.googleusercontent.com/aida-public/AB6AXuAnSxIRAefH0x4DsitrkT8S7WHc5khkzz8soJPJdx5Mq7177TBH90MJsZpytHI5Ccvr40OQ_s0CJ7Hmu0yn5JgYOqIA70LqwzbH9Ca33SF1URrwdPJk6WCpTwCRvKyBvAT1rer2g8HkfQXORdHNAMOZR2XCNvpaIG92UBbllxwAyAFPvJ2lk8E0zzSlPFzUOWuH5djg0hBydUt6_Kd0IazTik9UNTeqM1mPkS_MrwrOd9t38-FgOS3hSw'}"/>
            <div class="absolute bottom-0 right-0 bg-background/80 px-2 py-1 border-t border-l border-outline-variant">
              <span class="font-label-mono text-[10px] text-secondary">${p.exhibit_label || `EXHIBIT`}</span>
            </div>
          </div>
          <div class="text-center mb-4">
            <h3 class="font-headline-md text-2xl text-on-surface font-bold uppercase tracking-tight mb-2">${p.name}</h3>
            ${p.tagline ? `<p class="font-label-mono text-[10px] text-on-surface-variant mb-2">${p.tagline}</p>` : ''}
            <div class="flex flex-wrap gap-1.5 justify-center">${tech}</div>
          </div>
          <div class="mt-auto border-t border-outline-variant pt-4 text-center">
            <div class="font-label-mono text-xs uppercase text-secondary-container">STATUS: <span class="text-secondary font-bold">${p.status || 'UNKNOWN'}</span></div>
            <p class="font-label-mono text-[10px] text-on-surface-variant mt-2">SEVERITY: ${p.severity || 'UNKNOWN'}</p>
          </div>
        </article>
      `;
    }).join('');

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  setTimeout(() => {
    loadProjects();
  }, 100);
</script>
